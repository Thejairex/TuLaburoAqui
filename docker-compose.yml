services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: labormarket-app
    container_name: labormarket-app
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/database
      - storage_data:/app/storage
      - ./docker/php.ini:/usr/local/etc/php/conf.d/app.ini:ro
      - app_storage:/var/www/html/storage/app/public
    privileged: true
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      PHP_UPLOAD_MAX_FILESIZE: 50M
      PHP_POST_MAX_SIZE: 50M
    networks:
      - proxy
      - app-network
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: laborMarket-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8100}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
    volumes_from:
       - app:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - app-network
      - proxy

  queue:
    image: labormarket-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --delay=3 --sleep=3
    volumes:
      - sqlite_data:/app/database
      - storage_data:/app/storage
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    depends_on:
      - app
    networks:
      - app-network

volumes:
  sqlite_data:
  storage_data:
  app_storage:

networks:
  proxy:
    external: true
  app-network:
    driver: bridge
