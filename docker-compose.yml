services:

  # Laravel + PHP-FPM
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      APP_NAME: "TuLaburoAqui"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL:-http://localhost}"
      DB_CONNECTION: pgsql
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_DATABASE: "${DB_DATABASE:-tulaburo}"
      DB_USERNAME: "${DB_USERNAME:-tulaburo}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_CLIENT: "${REDIS_CLIENT:-array}"
      CACHE_STORE: "${CACHE_STORE:-file}"
      SESSION_DRIVER: "${SESSION_DRIVER:-file}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-sync}"
      FILESYSTEM_DISK: local
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
    volumes:
      - app_storage:/app/storage
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - proxy

  # Nginx: único punto de entrada público (8100 externo → 80 interno)
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8100:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - proxy

volumes:
  app_storage:

networks:
  proxy:
    external: true
