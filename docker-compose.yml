services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tulaburoaqui-app
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/database
      - storage_data:/app/storage
      - ./docker/php.ini:/usr/local/etc/php/conf.d/app.ini:ro
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8100}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - app-network

  queue:
    image: tulaburoaqui-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --delay=3 --sleep=3
    volumes:
      - sqlite_data:/app/database
      - storage_data:/app/storage
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    depends_on:
      - app
    networks:
      - app-network

volumes:
  sqlite_data:
  storage_data:

networks:
  app-network:
    driver: bridge
