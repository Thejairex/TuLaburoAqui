[PHP]
expose_php = Off
max_execution_time = 90
max_input_time = 120
memory_limit = 256M
post_max_size = 64M
upload_max_filesize = 32M

[Date]
date.timezone = UTC

[opcache]
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1
