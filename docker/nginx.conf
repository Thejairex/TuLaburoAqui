server {
    listen 80;
    server_name _;
    root /app/public;
    index index.php;

    client_max_body_size 55M;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # Assets estáticos: nginx los sirve directamente desde el filesystem de app
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel: todo lo demás va a index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM escucha en 9000 (puerto interno Docker)
    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout    120;
        fastcgi_connect_timeout 120;
    }

    # Bloquear acceso a archivos ocultos (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
